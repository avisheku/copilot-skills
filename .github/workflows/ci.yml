name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PowerShell gates
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run CI gates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\Test-CI.ps1

      - name: Upload local dashboard
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: local-dashboard
          path: |
            evidence/dashboard.html
            evidence/golden-path.json
          if-no-files-found: ignore
