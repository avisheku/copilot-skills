<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="Skillrig  Copilot skills harness">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071018"/>
      <stop offset="45%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0E4D5C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3DDC97" stop-opacity="0"/>
      <stop offset="40%" stop-color="#3DDC97" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#F4A261" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F4A261" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3DDC97"/>
      <stop offset="100%" stop-color="#F4A261"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E6EEF2" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <ellipse cx="980" cy="210" rx="420" ry="180" fill="url(#glow)"/>

  <!-- Large mark -->
  <g transform="translate(72,110)">
    <rect width="160" height="160" rx="36" fill="#0A1628" stroke="#3DDC97" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M42 48h76v16H42z" fill="#E6EEF2" opacity="0.9"/>
    <path d="M42 96h76v16H42z" fill="#E6EEF2" opacity="0.9"/>
    <path d="M52 48v64h16V48z" fill="#E6EEF2" opacity="0.7"/>
    <path d="M92 48v64h16V48z" fill="#E6EEF2" opacity="0.7"/>
    <path d="M34 72h92v16H34z" fill="url(#rail)"/>
    <circle cx="46" cy="80" r="6" fill="#0A1628"/>
    <circle cx="80" cy="80" r="6" fill="#0A1628"/>
    <circle cx="114" cy="80" r="6" fill="#0A1628"/>
    <circle cx="46" cy="80" r="2.5" fill="#3DDC97"/>
    <circle cx="80" cy="80" r="2.5" fill="#E6EEF2"/>
    <circle cx="114" cy="80" r="2.5" fill="#F4A261"/>
  </g>

  <!-- Wordmark -->
  <text x="280" y="188" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="84" font-weight="700" fill="#E6EEF2" letter-spacing="-1.5">Skillrig</text>
  <text x="284" y="238" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="500" fill="#8BA3B5" letter-spacing="0.5">Copilot skills harness</text>
  <text x="284" y="292" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#3DDC97">Structure · Prove · Upgrade at AI pace</text>

  <!-- Accent rail -->
  <rect x="0" y="404" width="1280" height="16" fill="url(#rail)"/>
