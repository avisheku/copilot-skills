<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="SkillGrid">
  <!-- 3x3 node grid — dark rails + neon signal path -->
  <g fill="none" stroke="#0B2A2E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- verticals -->
    <path d="M32 32v64"/>
    <path d="M64 32v64"/>
    <path d="M96 32v32"/>
    <!-- horizontals -->
    <path d="M32 32h64"/>
    <path d="M32 64h64"/>
    <path d="M32 96h32"/>
  </g>
  <!-- neon path highlight (S-flow through grid) -->
  <g fill="none" stroke="#7CFF4A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M32 32h64v32H32v32h32"/>
  </g>
  <!-- nodes: dark -->
  <circle cx="32" cy="96" r="9" fill="#0B2A2E"/>
  <circle cx="96" cy="32" r="9" fill="#0B2A2E"/>
  <circle cx="96" cy="64" r="9" fill="#0B2A2E"/>
  <circle cx="64" cy="96" r="9" fill="#0B2A2E"/>
  <circle cx="96" cy="96" r="9" fill="#0B2A2E"/>
  <!-- nodes: neon signal -->
  <circle cx="32" cy="32" r="11" fill="#7CFF4A"/>
  <circle cx="64" cy="32" r="11" fill="#7CFF4A"/>
  <circle cx="32" cy="64" r="11" fill="#7CFF4A"/>
  <circle cx="64" cy="64" r="11" fill="#7CFF4A"/>
</svg>
